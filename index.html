<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SpendSmart - Expense Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Outfit:wght@400;500;600&display=swap" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0d0f14;--surface:#161920;--card:#1e2230;--card2:#252a3a;
  --border:#2e3348;--text:#e8eaf0;--muted:#7a7f99;
  --green:#00d68f;--red:#ff4d6d;--blue:#4d9fff;
}
body{font-family:'Outfit',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}

.topbar{background:var(--surface);border-bottom:1px solid var(--border);height:62px;
  padding:0 2rem;display:flex;align-items:center;justify-content:space-between;
  position:sticky;top:0;z-index:100}
.brand{font-family:'Syne',sans-serif;font-size:1.4rem;font-weight:800}
.brand span{color:var(--green)}
.topbar-right{display:flex;gap:.8rem;align-items:center}
select.fsel{background:var(--card);border:1px solid var(--border);color:var(--text);
  padding:.45rem .9rem;border-radius:8px;font-size:.85rem;outline:none;cursor:pointer}
.btn-cl{background:transparent;border:1px solid var(--border);color:var(--muted);
  padding:.45rem 1rem;border-radius:8px;font-size:.85rem;cursor:pointer;transition:.2s}
.btn-cl:hover{border-color:var(--red);color:var(--red)}

.page{max-width:1280px;margin:0 auto;padding:1.8rem 2rem;display:flex;flex-direction:column;gap:1.4rem}

.sum-row{display:grid;grid-template-columns:repeat(3,1fr);gap:1rem}
.sc{background:var(--card);border:1px solid var(--border);border-radius:16px;
  padding:1.4rem 1.6rem;position:relative;overflow:hidden}
.sc.bal{border-top:3px solid var(--blue)}
.sc.inc{border-top:3px solid var(--green)}
.sc.exp{border-top:3px solid var(--red)}
.sc .lbl{font-size:.72rem;font-weight:600;letter-spacing:1px;text-transform:uppercase;
  color:var(--muted);margin-bottom:.5rem}
.sc .amt{font-family:'Syne',sans-serif;font-size:1.9rem;font-weight:800}
.sc.bal .amt{color:var(--blue)}
.sc.inc .amt{color:var(--green)}
.sc.exp .amt{color:var(--red)}
.sc .sub{font-size:.78rem;color:var(--muted);margin-top:.25rem}
.sc .ico{position:absolute;right:1.2rem;top:50%;transform:translateY(-50%);
  font-size:2.2rem;opacity:.1}

.grid{display:grid;grid-template-columns:370px 1fr;gap:1.4rem;align-items:start}
.lcol{display:flex;flex-direction:column;gap:1.2rem}

.box{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:1.5rem}
.ctitle{font-family:'Syne',sans-serif;font-size:1rem;font-weight:700;margin-bottom:1.2rem;
  display:flex;align-items:center;gap:.5rem}
.ctitle::before{content:'';width:4px;height:18px;background:var(--green);border-radius:3px}

.toggle{display:grid;grid-template-columns:1fr 1fr;gap:.5rem;margin-bottom:1rem}
.tbtn{padding:.6rem;border-radius:10px;border:1.5px solid var(--border);
  background:transparent;color:var(--muted);font-size:.9rem;font-weight:500;cursor:pointer;transition:.2s}
.tbtn.ai{background:rgba(0,214,143,.13);border-color:var(--green);color:var(--green)}
.tbtn.ae{background:rgba(255,77,109,.13);border-color:var(--red);color:var(--red)}

.fg{margin-bottom:.85rem}
.fg label{display:block;font-size:.7rem;font-weight:600;letter-spacing:.8px;
  text-transform:uppercase;color:var(--muted);margin-bottom:.3rem}
.fg input,.fg select{width:100%;background:var(--card2);border:1.5px solid var(--border);
  color:var(--text);padding:.6rem .85rem;border-radius:9px;font-size:.9rem;outline:none;transition:.2s}
.fg input:focus,.fg select:focus{border-color:var(--green);box-shadow:0 0 0 3px rgba(0,214,143,.1)}
.fg select option{background:var(--card2)}
.frow{display:grid;grid-template-columns:1fr 1fr;gap:.7rem}
.btn-add{width:100%;padding:.75rem;background:var(--green);color:#0d0f14;border:none;
  border-radius:10px;font-family:'Syne',sans-serif;font-size:.95rem;font-weight:700;
  cursor:pointer;transition:.2s;margin-top:.3rem}
.btn-add:hover{background:#00f5a3;transform:translateY(-2px)}

.chart-wrap{display:flex;justify-content:center;max-height:220px}
.no-chart{text-align:center;color:var(--muted);font-size:.85rem;padding:2rem 0}
.legend{display:flex;flex-wrap:wrap;gap:.5rem;margin-top:1rem}
.lpill{display:flex;align-items:center;gap:.35rem;background:var(--card2);
  border-radius:20px;padding:.25rem .7rem;font-size:.75rem;color:var(--muted)}
.ldot{width:8px;height:8px;border-radius:50%;flex-shrink:0}

.htop{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.1rem}
.hcount{font-size:.78rem;color:var(--muted);background:var(--card2);
  border-radius:20px;padding:.2rem .7rem}
.search{width:100%;background:var(--card2);border:1.5px solid var(--border);color:var(--text);
  padding:.6rem 1rem;border-radius:10px;font-size:.88rem;outline:none;
  margin-bottom:1rem;transition:.2s}
.search:focus{border-color:var(--green)}
.search::placeholder{color:var(--muted)}
.txlist{display:flex;flex-direction:column;gap:.6rem}
.txi{display:flex;align-items:center;gap:1rem;background:var(--card2);
  border:1px solid var(--border);border-radius:12px;padding:.85rem 1rem;transition:.2s}
.txi:hover{background:#2a2f42}
.txico{width:42px;height:42px;border-radius:12px;display:flex;align-items:center;
  justify-content:center;font-size:1.2rem;flex-shrink:0}
.txinfo{flex:1;min-width:0}
.txdesc{font-size:.9rem;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.txmeta{font-size:.73rem;color:var(--muted);margin-top:2px;display:flex;gap:.5rem;align-items:center}
.txbadge{background:var(--card);border-radius:4px;padding:1px 6px;font-size:.68rem}
.txamt{font-family:'Syne',sans-serif;font-size:1rem;font-weight:700;white-space:nowrap}
.txamt.i{color:var(--green)}
.txamt.e{color:var(--red)}
.txdel{background:transparent;border:none;color:var(--muted);font-size:1rem;
  cursor:pointer;padding:4px 7px;border-radius:6px;transition:.15s}
.txdel:hover{background:rgba(255,77,109,.13);color:var(--red)}
.empty{text-align:center;padding:3rem 1rem;color:var(--muted)}
.empty .ei{font-size:2.8rem;margin-bottom:.7rem;opacity:.35}

.toast{position:fixed;bottom:2rem;left:50%;transform:translateX(-50%) translateY(20px);
  background:var(--card2);border:1px solid var(--border);color:var(--text);
  padding:.7rem 1.5rem;border-radius:30px;font-size:.88rem;opacity:0;transition:.3s;
  z-index:999;white-space:nowrap}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.toast.g{border-color:var(--green);color:var(--green)}
.toast.r{border-color:var(--red);color:var(--red)}

@media(max-width:860px){
  .grid{grid-template-columns:1fr}
  .sum-row{grid-template-columns:1fr}
}</style>
</head>
<body>
    <div class="topbar">
  <div class="brand">Spend<span>Smart</span></div>
  <div class="topbar-right">
    <select class="fsel" id="monthFilter" onchange="renderAll()">
      <option value="all">All Time</option>
    </select>
    <button class="btn-cl" onclick="clearAll()">🗑 Clear All</button>
  </div>
</div>

<div class="page">

  <div class="sum-row">
    <div class="sc bal">
      <div class="lbl">Total Balance</div>
      <div class="amt" id="sbal">₹0.00</div>
      <div class="sub">Income minus expenses</div>
      <div class="ico">💳</div>
    </div>
    <div class="sc inc">
      <div class="lbl">Total Income</div>
      <div class="amt" id="sinc">₹0.00</div>
      <div class="sub" id="incsub">0 transactions</div>
      <div class="ico">📈</div>
    </div>
    <div class="sc exp">
      <div class="lbl">Total Expenses</div>
      <div class="amt" id="sexp">₹0.00</div>
      <div class="sub" id="expsub">0 transactions</div>
      <div class="ico">📉</div>
    </div>
  </div>

  <div class="grid">
    <div class="lcol">

      <div class="box">
        <div class="ctitle">Add Transaction</div>
        <div class="toggle">
          <button class="tbtn ai" id="btnI" onclick="setType('income')">➕ Income</button>
          <button class="tbtn"    id="btnE" onclick="setType('expense')">➖ Expense</button>
        </div>
        <div class="fg">
          <label>Description</label>
          <input type="text" id="fDesc" placeholder="e.g. Salary, Food, Rent..."/>
        </div>
        <div class="frow">
          <div class="fg">
            <label>Amount (₹)</label>
            <input type="number" id="fAmt" placeholder="0.00" min="0"/>
          </div>
          <div class="fg">
            <label>Date</label>
            <input type="date" id="fDate"/>
          </div>
        </div>
        <div class="fg">
          <label>Category</label>
          <select id="fCat">
            <option>Food</option>
            <option>Travel</option>
            <option>Bills</option>
            <option>Shopping</option>
            <option>Health</option>
            <option>Education</option>
            <option>Entertainment</option>
            <option selected>Salary</option>
            <option>Other</option>
          </select>
        </div>
        <button class="btn-add" onclick="addTx()">+ Add Transaction</button>
      </div>

      <div class="box">
        <div class="ctitle">Spending by Category</div>
        <div class="chart-wrap">
          <canvas id="pie" width="200" height="200"></canvas>
        </div>
        <div id="noChart" class="no-chart" style="display:none">
          📊 Add expenses to see chart
        </div>
        <div class="legend" id="legend"></div>
      </div>

    </div>

    <div class="box">
      <div class="htop">
        <div class="ctitle" style="margin-bottom:0">Transaction History</div>
        <span class="hcount" id="hcount">0 records</span>
      </div>
      <input class="search" type="text" id="search"
        placeholder="🔍 Search transactions..." oninput="renderAll()"/>
      <div class="txlist" id="txlist">
        <div class="empty">
          <div class="ei">💸</div>
          <p>No transactions yet.<br/>Add your first one above!</p>
        </div>
      </div>
    </div>

  </div>
</div>

<div class="toast" id="toast"></div> 
<script>
    var txs = JSON.parse(localStorage.getItem('ss_txs') || '[]');
var ctype = 'income';
var chart = null;

var COLORS = {
  Food:'#ff8c42', Travel:'#4d9fff', Bills:'#b57bee',
  Shopping:'#ffc947', Health:'#ff4d6d', Education:'#00c2cb',
  Entertainment:'#f97fb4', Salary:'#00d68f', Other:'#7a7f99'
};
var ICONS = {
  Food:'🍔', Travel:'🚗', Bills:'⚡', Shopping:'🛍',
  Health:'💊', Education:'📚', Entertainment:'🎬',
  Salary:'💼', Other:'📦'
};

window.onload = function(){
  document.getElementById('fDate').valueAsDate = new Date();
  buildMonths();
  renderAll();
};

function setType(t){
  ctype = t;
  document.getElementById('btnI').className = 'tbtn'+(t==='income' ? ' ai':'');
  document.getElementById('btnE').className = 'tbtn'+(t==='expense'? ' ae':'');
  document.getElementById('fCat').value = t==='income' ? 'Salary':'Food';
}

function addTx(){
  var desc = document.getElementById('fDesc').value.trim();
  var amt  = parseFloat(document.getElementById('fAmt').value);
  var date = document.getElementById('fDate').value;
  var cat  = document.getElementById('fCat').value;
  if(!desc){ toast('⚠ Enter a description','r'); return; }
  if(!amt||amt<=0){ toast('⚠ Enter a valid amount','r'); return; }
  if(!date){ toast('⚠ Select a date','r'); return; }
  txs.unshift({id:Date.now(),desc:desc,amt:amt,date:date,cat:cat,type:ctype});
  save(); buildMonths(); renderAll();
  document.getElementById('fDesc').value='';
  document.getElementById('fAmt').value='';
  document.getElementById('fDate').valueAsDate=new Date();
  toast(ctype==='income'?'✅ Income added!':'✅ Expense added!','g');
}

function delTx(id){
  txs=txs.filter(function(t){return t.id!==id;});
  save(); renderAll();
  toast('🗑 Deleted','r');
}

function clearAll(){
  if(!txs.length) return;
  if(!confirm('Delete ALL transactions?')) return;
  txs=[]; save(); buildMonths(); renderAll();
  toast('All cleared','r');
}

function getFiltered(){
  var mo=document.getElementById('monthFilter').value;
  var q=document.getElementById('search').value.toLowerCase();
  return txs.filter(function(t){
    return (mo==='all'||t.date.startsWith(mo)) &&
           (t.desc.toLowerCase().includes(q)||t.cat.toLowerCase().includes(q));
  });
}

function buildMonths(){
  var sel=document.getElementById('monthFilter');
  var cur=sel.value;
  var months=[];
  txs.forEach(function(t){
    var m=t.date.slice(0,7);
    if(months.indexOf(m)===-1) months.push(m);
  });
  months.sort().reverse();
  sel.innerHTML='<option value="all">All Time</option>';
  months.forEach(function(m){
    var p=m.split('-');
    var label=new Date(p[0],p[1]-1).toLocaleString('default',{month:'long',year:'numeric'});
    sel.innerHTML+='<option value="'+m+'">'+label+'</option>';
  });
  sel.value=cur;
}

function renderAll(){
  var f=getFiltered();
  renderSummary(f); renderList(f); renderChart(f);
}

function renderSummary(f){
  var inc=0,exp=0,ic=0,ec=0;
  f.forEach(function(t){
    if(t.type==='income'){inc+=t.amt;ic++;}
    else{exp+=t.amt;ec++;}
  });
  var bal=inc-exp;
  document.getElementById('sbal').textContent=fmt(bal);
  document.getElementById('sinc').textContent=fmt(inc);
  document.getElementById('sexp').textContent=fmt(exp);
  document.getElementById('incsub').textContent=ic+' transaction'+(ic!==1?'s':'');
  document.getElementById('expsub').textContent=ec+' transaction'+(ec!==1?'s':'');
  document.getElementById('sbal').style.color=bal>=0?'var(--blue)':'var(--red)';
}

function renderList(f){
  var list=document.getElementById('txlist');
  document.getElementById('hcount').textContent=f.length+' record'+(f.length!==1?'s':'');
  if(!f.length){
    list.innerHTML='<div class="empty"><div class="ei">💸</div><p>No transactions found.</p></div>';
    return;
  }
  list.innerHTML=f.map(function(t){
    var c=COLORS[t.cat]||'#7a7f99';
    var ic=ICONS[t.cat]||'📦';
    var isI=t.type==='income';
    var d=new Date(t.date).toLocaleDateString('en-IN',{day:'numeric',month:'short',year:'numeric'});
    return '<div class="txi">'+
      '<div class="txico" style="background:'+c+'22;color:'+c+'">'+ic+'</div>'+
      '<div class="txinfo">'+
        '<div class="txdesc">'+t.desc+'</div>'+
        '<div class="txmeta"><span>'+d+'</span>'+
        '<span class="txbadge" style="color:'+c+'">'+t.cat+'</span></div>'+
      '</div>'+
      '<div class="txamt '+(isI?'i':'e')+'">'+(isI?'+':'-')+fmt(t.amt)+'</div>'+
      '<button class="txdel" onclick="delTx('+t.id+')">✕</button>'+
    '</div>';
  }).join('');
}

function renderChart(f){
  var exps=f.filter(function(t){return t.type==='expense';});
  var canvas=document.getElementById('pie');
  var noMsg=document.getElementById('noChart');
  var leg=document.getElementById('legend');
  if(chart){chart.destroy();chart=null;}
  if(!exps.length){
    canvas.style.display='none';noMsg.style.display='block';leg.innerHTML='';return;
  }
  canvas.style.display='block';noMsg.style.display='none';
  var catMap={};
  exps.forEach(function(t){catMap[t.cat]=(catMap[t.cat]||0)+t.amt;});
  var labels=Object.keys(catMap);
  var data=Object.values(catMap);
  var colors=labels.map(function(l){return COLORS[l]||'#7a7f99';});
  var total=data.reduce(function(a,b){return a+b;},0);
  chart=new Chart(canvas,{
    type:'doughnut',
    data:{labels:labels,datasets:[{data:data,
      backgroundColor:colors.map(function(c){return c+'cc';}),
      borderColor:colors,borderWidth:2,hoverOffset:8}]},
    options:{cutout:'65%',plugins:{legend:{display:false},
      tooltip:{callbacks:{label:function(ctx){
        var pct=((ctx.parsed/total)*100).toFixed(1);
        return ' '+fmt(ctx.parsed)+' ('+pct+'%)';
      }}}}}
  });
  leg.innerHTML=labels.map(function(l,i){
    return '<div class="lpill">'+
      '<div class="ldot" style="background:'+colors[i]+'"></div>'+
      l+' — '+fmt(data[i])+'</div>';
  }).join('');
}

function fmt(n){
  return '₹'+Math.abs(n).toLocaleString('en-IN',
    {minimumFractionDigits:2,maximumFractionDigits:2});
}
function save(){localStorage.setItem('ss_txs',JSON.stringify(txs));}
var tTimer;
function toast(msg,cls){
  var el=document.getElementById('toast');
  el.textContent=msg;
  el.className='toast show '+(cls||'');
  clearTimeout(tTimer);
  tTimer=setTimeout(function(){el.className='toast';},2500);
}
</script>   
</body>
</html>
